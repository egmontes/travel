<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Travel Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Prevent iOS auto-zoom on input focus */
@media screen and (-webkit-min-device-pixel-ratio: 0) {
  input, select, textarea { font-size: 16px !important; }
}

  :root {
    --bg: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #ede8f5;
    --text: #1a1a18; --text-secondary: #5f5e5a; --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12); --border-secondary: rgba(0,0,0,0.22);
    --radius-md: 8px; --radius-lg: 12px;
    --green-text: #3b6d11; --amber-text: #854f0b;
    --danger-bg: #fcebeb; --danger-text: #a32d2d;
    --info-bg: #e6f1fb; --info-text: #185fa5;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2b;
      --text: #f0ede6; --text-secondary: #a8a79f; --text-tertiary: #6e6d68;
      --border: rgba(255,255,255,0.1); --border-secondary: rgba(255,255,255,0.18);
      --green-text: #97c459; --amber-text: #ef9f27;
      --danger-bg: #2a1010; --danger-text: #f09595;
      --info-bg: #0c1e30; --info-text: #85b7eb;
    }
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg-tertiary); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; }
  .page { max-width: 860px; margin: 0 auto; padding: 0 1.25rem 1rem; }
  .sticky-header { position: sticky; top: 0; z-index: 100; background: var(--bg-tertiary); padding: 1.5rem 0 0.75rem; margin-bottom: 0.75rem; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 1.75rem; }
  h1 { font-size: 32px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  .page-sub { font-size: 14px; color: var(--text-secondary); margin-top: 3px; }
  .header-actions { display: flex; gap: 4px; flex-wrap: nowrap; align-items: center; }
  .action-btn { padding: 5px 10px !important; font-size: 16px !important; min-width: 0; }

  .sync-bar { display: flex; align-items: center; gap: 5px; }
  @media (max-width: 600px) {
    .sync-bar { position: fixed; top: 6px; right: 10px; z-index: 200; background: transparent; }
    .sync-bar span { display: none; } /* hide text, just show dot on mobile */
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.connected { background: var(--green-text); }
  .sync-dot.syncing { background: var(--amber-text); }
  .sync-dot.error { background: var(--danger-text); }

  .setup-banner { background: var(--info-bg); border: 1px solid var(--border-secondary); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 1.5rem; }
  .setup-banner h2 { font-size: 15px; font-weight: 500; color: var(--info-text); margin-bottom: 6px; }
  .setup-banner p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.75rem; }
  .stat { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--text); }
  .stat-value.green { color: var(--green-text); }
  .stat-value.amber { color: var(--amber-text); }

  .trip-list { display: flex; flex-direction: column; gap: 10px; }
  .trip-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: opacity 0.25s, filter 0.25s, border 0.2s, background 0.2s; }
  .trip-card.faded { opacity: 0.35; filter: grayscale(0.4); }
  .trip-header { display: flex; flex-direction: column; align-items: stretch; gap: 0; padding: 12px 16px; cursor: pointer; user-select: none; transition: background 0.15s, border 0.15s; }
  .trip-header:hover { background: var(--bg-secondary); }
  .month-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .trip-meta { flex: 1; min-width: 0; }
  .trip-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; min-width: 0; }
  .trip-name { font-size: 16px; font-weight: 700; color: var(--trip-color, var(--text)); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; text-transform: uppercase; letter-spacing: 0.04em; }
  .trip-header-top { display: flex; align-items: center; gap: 8px; width: 100%; min-width: 0; margin-bottom: 6px; }
  .trip-header-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%; }
  .trip-meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex: 1; min-width: 0; }
  .past-trip .trip-name { color: var(--text-secondary); }
  .past-badge { font-size: 11px; background: var(--bg-secondary); color: var(--text-tertiary); border-radius: 4px; padding: 2px 6px; }
  .trip-date-label { font-size: 13px; color: var(--text-secondary); }
  .trip-location-label { font-size: 12px; color: var(--text-tertiary); margin-top: 1px; }
  .trip-link-label { font-size: 12px; color: var(--info-text, #185fa5); text-decoration: underline; margin-top: 1px; }
  .rsvp-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; margin-top: 2px; }
  .rsvp-badge.rsvp-done { background: #22c55e; color: #fff; }
  .rsvp-badge.rsvp-needed { background: #ff4444; color: #fff; }
  .category-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border); margin-left: 6px; }
  .category-banner { text-align: center; }
  .trip-countdown { font-size: 11px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; letter-spacing: 0.02em; }
  .trip-countdown.soon { color: var(--amber-text); }
  .trip-countdown.very-soon { color: var(--danger-text, #a32d2d); }
  .trip-countdown.past { color: var(--text-tertiary); font-style: italic; }
  .category-banner-text { font-size: 12px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .add-req-row { display: flex; flex-direction: column; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--trip-border, var(--border)); background: var(--trip-bg, var(--bg-secondary)); }
  .add-req-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .add-req-fields.three { grid-template-columns: 1fr 1fr 1fr; }
  .add-req-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .add-req-section { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin-bottom: -2px; }
  .add-req-input { font-size: 13px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); padding: 5px 10px; background: var(--bg); color: var(--text); font-family: inherit; flex: 1; min-width: 0; }
  .add-req-input:focus { outline: none; border-color: var(--text-secondary); }
  .add-req-btn { font-size: 12px; padding: 5px 12px; border-radius: var(--radius-md); border: 1px solid var(--border-secondary); background: transparent; color: var(--text-secondary); cursor: pointer; font-family: inherit; white-space: nowrap; }
  .add-req-btn:hover { background: var(--bg); color: var(--text); }
  .add-req-trigger { display: flex; align-items: center; gap: 6px; padding: 9px 16px; border-top: 1px solid var(--trip-border, var(--border)); color: var(--trip-color, var(--text-tertiary)); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; background: var(--trip-bg, transparent); }
  .add-req-trigger:hover { filter: brightness(0.95); }
  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-bar { width: 56px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .progress-text { font-size: 12px; color: var(--text-secondary); min-width: 28px; text-align: right; }

  .btn { font-size: 13px; padding: 6px 12px; border-radius: var(--radius-md); border: 1px solid var(--border-secondary); background: transparent; color: var(--text); cursor: pointer; transition: background 0.15s; white-space: nowrap; font-family: inherit; }
  .btn:hover { background: var(--bg-secondary); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; font-weight: 500; }
  .btn-primary:hover { opacity: 0.85; background: var(--text); }
  .btn-sm { font-size: 12px; padding: 4px 10px; }
  .btn-danger { color: var(--danger-text); }
  .btn-danger:hover { background: var(--danger-bg); }

  .chevron { font-size: 12px; transition: transform 0.2s; display: inline-block; }
  .trip-chevron-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 6px 16px; margin-top: 0; background: var(--trip-bg, var(--bg-secondary)); color: var(--trip-color, var(--text-tertiary)); font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; border-radius: 0; }
  .trip-items-wrap { position: relative; display: block; }
  .trip-items-wrap::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 44px; background: linear-gradient(to bottom, transparent, var(--bg)); pointer-events: none; transition: opacity 0.2s; z-index: 2; }
  .trip-items-wrap::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 32px; background: linear-gradient(to top, transparent, var(--bg)); pointer-events: none; transition: opacity 0.2s; z-index: 2; opacity: 0; }
  .trip-items-wrap:not(.at-top)::before { opacity: 1; }
  .trip-items-wrap.at-bottom::after { opacity: 0; }
  .trip-items { max-height: 40vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .col-header { display: grid; grid-template-columns: 1fr 150px 150px 1fr; gap: 10px; padding: 7px 16px; background: var(--bg-secondary); border-top: 1px solid var(--trip-border, var(--border)); border-bottom: 1px solid var(--trip-border, var(--border)); }
  .col-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
  .item-row { display: grid; grid-template-columns: 1fr 150px 150px 1fr; align-items: center; gap: 10px; padding: 10px 16px; border-top: 1px solid var(--trip-border, var(--border)); }
  .item-row-top { display: none; }
  .item-desktop-name { display: block; }
  .item-notes-cell { display: block; }
  .item-edit-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 900; align-items: flex-end; justify-content: center; touch-action: none; }
  .item-edit-modal.open { display: flex; }
  @media (min-width: 601px) { .item-edit-modal { align-items: center; } .mobile-item-sheet { border-radius: var(--radius-lg); max-width: 480px; max-height: 80vh; overflow-x: hidden; } }

  .mobile-item-sheet { background: var(--bg); border-radius: var(--radius-lg) var(--radius-lg) 0 0; width: 100%; max-height: 85vh; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 0 env(safe-area-inset-bottom,0); box-sizing: border-box; will-change: transform; }
  .mobile-item-sheet-handle { width: 36px; height: 4px; background: var(--border-secondary); border-radius: 2px; margin: 10px auto 0; }
  .mobile-item-sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 10px; border-bottom: 1px solid var(--trip-border, var(--border)); }
  .mobile-item-sheet-title { font-size: 15px; font-weight: 700; color: var(--trip-color, var(--text)); text-transform: uppercase; letter-spacing: 0.03em; }
  .mobile-item-sheet-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-secondary); padding: 0 4px; line-height: 1; }
  .mobile-item-field { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .mobile-item-field label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px; }
  .mobile-item-field input, .mobile-item-field select { width: 100%; max-width: 100%; font-size: 16px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); padding: 8px 6px; background: var(--bg); color: var(--text); font-family: inherit; box-sizing: border-box; min-width: 0; }
  .mobile-item-field select.s-green { background: #22c55e; color: #ffffff; border-color: #16a34a; }
  .mobile-item-field select.s-red   { background: #ff4444; color: #ffffff; border-color: #cc0000; }
  .mobile-item-date-range { display: flex; align-items: center; gap: 8px; }
  .mobile-item-date-range input { flex: 1; }
  .item-name { font-size: 16px; font-weight: 700; color: var(--trip-color, var(--text)); text-transform: uppercase; letter-spacing: 0.03em; }
  .item-date-lbl { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .item-details-lbl { font-size: 13px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-select { font-size: 13px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); padding: 5px 8px; background: var(--bg); color: var(--text); cursor: pointer; width: 100%; font-family: inherit; }
  .status-select.s-green { background: #22c55e; color: #ffffff; border-color: #16a34a; }
  .status-select.s-red   { background: #ff4444; color: #ffffff; border-color: #cc0000; }
  @media (prefers-color-scheme: dark) {
    .status-select.s-green { background: #14532d; color: #86efac; border-color: #166534; }
    .status-select.s-red   { background: #450a0a; color: #fca5a5; border-color: #991b1b; }
  }

  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg); border: 1px solid var(--border-secondary); border-radius: var(--radius-lg); width: 100%; max-width: 620px; overflow: hidden; margin: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--trip-border, var(--border)); }
  .modal-title { font-size: 16px; font-weight: 500; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px; font-family: inherit; }
  .modal-close:hover { background: var(--bg-secondary); }
  .modal-body { padding: 20px; }
  .field-group { margin-bottom: 14px; }
  .field-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; display: block; }
  .field-input { font-size: 14px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); padding: 8px 10px; background: var(--bg); color: var(--text); width: 100%; font-family: inherit; }
  .field-input:focus { outline: none; border-color: var(--text-secondary); }
  .trip-fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .section-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin: 20px 0 10px; }
  .section-label:first-child { margin-top: 0; }
  .items-table { border-collapse: collapse; font-size: 13px; min-width: 700px; }
  .items-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .items-table th { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--trip-border, var(--border)); font-weight: 500; white-space: nowrap; }
  .items-table td { padding: 8px 6px; vertical-align: middle; white-space: nowrap; }
  .items-table tbody tr:not(:last-child) td { border-bottom: 1px solid var(--trip-border, var(--border)); }
  .table-input { font-size: 13px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); padding: 5px 7px; background: var(--bg); color: var(--text); width: 100%; font-family: inherit; box-sizing: border-box; }
  .table-input:focus { outline: none; border-color: var(--text-secondary); }
  .table-select { font-size: 13px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); padding: 5px 6px; background: var(--bg); color: var(--text); width: 100%; font-family: inherit; box-sizing: border-box; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text-tertiary); font-size: 18px; padding: 2px 6px; line-height: 1; border-radius: 4px; font-family: inherit; }
  .del-btn:hover { color: var(--danger-text); background: var(--danger-bg); }
  .add-row-btn { font-size: 13px; padding: 7px 12px; color: var(--text-secondary); background: transparent; border: 0.5px dashed var(--border-secondary); border-radius: var(--radius-md); cursor: pointer; width: 100%; margin-top: 10px; text-align: center; font-family: inherit; transition: background 0.15s; }
  .add-row-btn:hover { background: var(--bg-secondary); }
  .modal-footer { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-top: 1px solid var(--trip-border, var(--border)); gap: 8px; }
  .modal-footer-right { display: flex; gap: 8px; }

  .add-trip-area { display: none; }
  .fab-add-trip { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--text); color: var(--bg); border: none; font-size: 28px; line-height: 1; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.25); z-index: 200; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, box-shadow 0.15s; }
  .fab-add-trip:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  .fab-add-trip:active { transform: scale(0.95); }
  .add-trip-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 12px; border: 0.5px dashed var(--border-secondary); border-radius: var(--radius-lg); background: transparent; color: var(--text-secondary); font-size: 14px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .add-trip-btn:hover { background: var(--bg-secondary); color: var(--text); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--bg); border-radius: var(--radius-md); padding: 10px 16px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; pointer-events: none; z-index: 2000; }
  .toast.show { opacity: 1; transform: translateY(0); }

  .tab-nav { display: flex; gap: 2px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 4px; margin-bottom: 0; width: fit-content; }
  .tab-btn { font-size: 13px; font-weight: 500; padding: 7px 18px; border-radius: 9px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .tab-count { font-size: 11px; font-weight: 400; margin-left: 5px; opacity: 0.6; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); font-size: 14px; }
  .month-divider { font-size: 11px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; padding: 16px 4px 6px; display: flex; align-items: center; gap: 10px; }
  .month-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .tab-nav-wrap { position: relative; padding: 0; margin-bottom: 0; }
  .filter-pills-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 6px 4px 4px; white-space: nowrap; }
  .filter-pills-wrap::-webkit-scrollbar { display: none; }
  .filter-pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: var(--bg); color: var(--text-secondary); margin-right: 6px; transition: all 0.15s; user-select: none; }
  .filter-pill:last-child { margin-right: 0; }
  .filter-pill.active { border-color: var(--text); background: var(--text); color: var(--bg); }
  .swipe-hint { display: none; font-size: 11px; color: var(--text-tertiary); text-align: center; margin-top: 6px; letter-spacing: 0.02em; }

  /* Trip status indicators */
  .status-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; white-space: nowrap; }
  .status-pill.complete  { background: #dbeafe; color: #1e40af; }
  .status-pill.ready     { background: #22c55e; color: #ffffff; }
  .status-pill.progress  { background: #fef9c3; color: #854d0e; }
  .status-pill.attention { background: #ffedd5; color: #9a3412; }
  .status-pill.notstarted{ background: #ff4444; color: #ffffff; }
  .month-dot { transition: background 0.3s; }

  @media (prefers-color-scheme: dark) {
    .status-pill.complete  { background: #1e3a6e; color: #93c5fd; }
    .status-pill.ready     { background: #14532d; color: #86efac; }
    .status-pill.progress  { background: #422006; color: #fcd34d; }
    .status-pill.attention { background: #431407; color: #fdba74; }
    .status-pill.notstarted{ background: #450a0a; color: #fca5a5; }
  }

  /* List view */
  .list-view-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .list-view-item:last-child { border-bottom: none; }

  /* Other category customizer */

let _pendingSave = false;

async function persist() {
  if (IS_LOCAL) {
    try { localStorage.setItem('trips_local', JSON.stringify(trips)); } catch(e) {}
    return;
  }
  if (!db || !_fbDoc || !_fbSetDoc) {
    // Firebase not ready yet — mark pending and retry when connected
    _pendingSave = true;
    setSyncState('syncing', 'Waiting to save…');
    return;
  }
  _pendingSave = false;
  writing = true;
  setSyncState('syncing','Saving…');
  try {
    await _fbSetDoc(_fbDoc(db, ...DOC_PATH), { trips });
    const t = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setSyncState('connected','Connected · saved at ' + t);
  } catch(e) {
    setSyncState('error','Save failed · tap to retry');
    showToast('Save failed: ' + e.message);
    console.error('persist error:', e);
  } finally { writing = false; }
}

function parseDateStr(s) {
  if (!s) return null;
  // ISO date: 2026-06-15
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const [y,mo,d] = s.split('-').map(Number);
    return new Date(y, mo-1, d);
  }
  // Legacy "Jan 8" format
  const mo = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const m = s.match(/^([A-Za-z]+)\s+(\d+)/);
  return m ? new Date(2026, mo[m[1]], +m[2]) : null;
}
function monthFromDate(s) {
  const d = parseDateStr(s);
  return d ? d.getMonth() : 0;
}
function formatDateDisplay(s) {
  if (!s) return '';
  const d = parseDateStr(s);
  if (!d) return s;
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function tripStatus(ti) {
  const trip = trips[ti];
  const past = isPast(trip);
  const dateKey = trip.startDate || trip.date;
  const total = trip.items.length;
  if (total === 0) return { key: 'notstarted', color: '#ef4444', pill: 'notstarted', label: 'Not started', icon: '○' };
  const done = trip.items.filter(it => it.status === 'Booked' || it.status === 'Confirmed').length;
  const pct = done / total;
  if (past) {
    return { key: 'complete', color: '#3b82f6', pill: 'complete', label: 'Complete', icon: '✓' };
  }
  if (pct === 1)   return { key: 'ready',      color: '#22c55e', pill: 'ready',      label: 'All set',      icon: '✓' };
  if (pct >= 0.5)  return { key: 'progress',   color: '#eab308', pill: 'progress',   label: 'In progress',  icon: '◑' };
  if (pct > 0)     return { key: 'attention',  color: '#f97316', pill: 'attention',  label: 'Needs work',   icon: '!' };
  return           { key: 'notstarted',         color: '#ef4444', pill: 'notstarted', label: 'Not started',  icon: '○' };
}

function locationDisplayStr(trip) {
  if (trip.locationDisplay) return trip.locationDisplay;
  if (!trip.location) return '';
  const parts = trip.location.split(',').map(s => s.trim()).filter(Boolean);
  const skipPat = /^[\d\s]+$|^\d{4,}$|^[A-Z]{2}$/;
  const streetWords = /^(street|st|avenue|ave|road|rd|drive|dr|blvd|lane|ln|way|court|ct|place|pl|highway|hwy|plaza|square|park|center|centre)$/i;
  const isCity = p => {
    if (skipPat.test(p) || p.length <= 3) return false;
    return !p.split(' ').some(w => streetWords.test(w));
  };
  // Score each segment — prefer ones without digits and without street words
  const candidates = parts.filter(isCity);
  // Pick the one most likely to be a city: prefer parts without numbers, mid-to-late in the address
  // (Nominatim puts city after neighborhood/suburb)
  const noNumbers = candidates.filter(p => !/\d/.test(p));
  if (noNumbers.length >= 2) return noNumbers[1]; // 2nd city-like = usually the actual city
  if (noNumbers.length === 1) return noNumbers[0];
  return candidates[0] || parts.find(p => !skipPat.test(p)) || trip.location;
}

function rsvpStatus(trip) {
  const rsvpItems = trip.items.filter(it => it.name && it.name.includes('RSVP'));
  if (!rsvpItems.length) return null;
  const allDone = rsvpItems.every(it => it.status === 'Booked' || it.status === 'Confirmed');
  return allDone ? 'done' : 'needed';
}

function countdownStr(trip) {
  const d = parseDateStr(trip.startDate || trip.date);
  if (!d) return null;
  const diff = Math.round((d - TODAY) / (1000 * 60 * 60 * 24));
  if (diff < 0) return { text: `${Math.abs(diff)}d ago`, cls: 'past' };
  if (diff === 0) return { text: 'Today!', cls: 'very-soon' };
  if (diff === 1) return { text: 'Tomorrow!', cls: 'very-soon' };
  if (diff <= 7) return { text: `In ${diff} days`, cls: 'very-soon' };
  if (diff <= 30) return { text: `In ${diff} days`, cls: 'soon' };
  const weeks = Math.round(diff / 7);
  if (diff < 60) return { text: `In ${weeks}w`, cls: '' };
  const months = Math.round(diff / 30);
  return { text: `In ${months}mo`, cls: '' };
}

const TABS = ['upcoming', 'all', 'past'];

function indicesFor(tab) {
  return trips.map((_,i) => i)
    .filter(i => {
      const past = isPast(trips[i]);
      if (tab === 'upcoming') return !past && passesFilter(trips[i]);
      if (tab === 'past') return past && passesFilter(trips[i]);
      return passesFilter(trips[i]);
    })
    .sort((a,b) => {
      const da = parseDateStr(trips[a].startDate || trips[a].date);
      const db = parseDateStr(trips[b].startDate || trips[b].date);
      if (!da && !db) return 0;
      if (!da) return 1;
      if (!db) return -1;
      return da - db;
    });
}

function updateTabCounts() {
  document.getElementById('cnt-upcoming').textContent = trips.filter(t => !isPast(t)).length;
  document.getElementById('cnt-all').textContent = trips.length;
  document.getElementById('cnt-past').textContent = trips.filter(t => isPast(t)).length;
}

function positionTrack() {
  const track = document.getElementById('sliderTrack');
  if (track) track.style.transform = `translateX(${-TABS.indexOf(activeTab) * (100/3)}%)`;
  // After transition, collapse inactive panels so they don't add scroll height
  clearTimeout(positionTrack._tid);
  // First show all so transition works
  TABS.forEach(tab => {
    const panel = document.getElementById('panel-' + tab);
    if (panel) panel.classList.remove('inactive');
  });
  // Then after transition completes, hide inactive ones
  positionTrack._tid = setTimeout(() => {
    TABS.forEach(tab => {
      const panel = document.getElementById('panel-' + tab);
      if (panel) panel.classList.toggle('inactive', tab !== activeTab);
    });
  }, 350);
}

function setTab(tab) {
  activeTab = tab;
  expanded = {};
  TABS.forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t === tab));
  renderAll();
  positionTrack();
  updateFade();
}

function renderPanel(tab) {
  const indices = indicesFor(tab);
  const listEl = document.getElementById('tripList-' + tab);
  if (!listEl) return;
  const msgs = { upcoming: 'No upcoming trips', all: 'No trips yet', past: 'No past trips' };
  if (indices.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div style="font-size:32px;margin-bottom:12px;opacity:0.35">&#9992;</div>${msgs[tab]}</div>`;
    return;
  }
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let lastMonth = null;
  let html = '';
  indices.forEach(i => {
    const trip = trips[i];
    const d = parseDateStr(trip.startDate || trip.date);
    const month = d ? d.getMonth() : null;
    const year = d ? d.getFullYear() : null;
    if (month !== null && month !== lastMonth) {
      html += `<div class="month-divider">${MONTHS[month]} ${year !== 2026 ? year : ''}</div>`;
      lastMonth = month;
    }
    html += tripHTML(i);
  });
  listEl.innerHTML = html;
}

function renderAll() {
  TABS.forEach(t => renderPanel(t));
  updateTabCounts();
  positionTrack();
}

function handleHeaderClick(e,ti) {
  if (e.target.closest('.btn')) return;
  expanded[ti] = !expanded[ti];
  TABS.forEach(tab => {
    const el = document.querySelector('#tripList-' + tab + ' #tc-' + ti);
    if (el) el.outerHTML = tripHTML(ti);
  });
  updateFade();
  // Init fade state for newly opened trip
  if (expanded[ti]) {
    setTimeout(() => {
      const wrap = document.getElementById('tiw-' + ti);
      if (wrap) {
        const items = wrap.querySelector('.trip-items');
        if (items) updateTripItemsFade(items);
      }
    }, 50);
  }
}

// ── Location autocomplete via OpenStreetMap Nominatim ──
let _locTimer = null;

function locationInput(val) {
  if (window._editDraft) { window._editDraft.location = val; window._editDraft.locationDisplay = null; }
  clearTimeout(_locTimer);
  const dd = document.getElementById('loc-dropdown');
  if (!dd) return;
  if (!val || val.length < 3) { dd.style.display = 'none'; return; }
  dd.style.display = 'block';
  dd.innerHTML = '<div class="location-searching">Searching…</div>';
  _locTimer = setTimeout(() => fetchLocations(val), 400);
}

async function fetchLocations(query) {
  const dd = document.getElementById('loc-dropdown');
  if (!dd) return;
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=6&addressdetails=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await res.json();
    if (!data.length) { dd.innerHTML = '<div class="location-searching">No results found</div>'; return; }
    dd.innerHTML = '';
    data.forEach(place => {
      const addr = place.address || {};
      const city = addr.city || addr.town || addr.village || addr.municipality || '';
      const state = addr.state || addr.region || '';
      const country = addr.country || '';
      // Use state abbreviation if available (ISO 3166-2 code minus country prefix)
      const stateAbbr = addr['ISO3166-2-lvl4'] ? addr['ISO3166-2-lvl4'].split('-').pop() : state;
      const displayLabel = city ? (stateAbbr ? `${city}, ${stateAbbr}` : city) : (state || country || 'TBD');
      const fullAddr = place.display_name;
      const div = document.createElement('div');
      div.className = 'location-opt';
      div.innerHTML = `<div class="location-opt-main">${esc(displayLabel)}</div><div class="location-opt-sub">${esc(fullAddr)}</div>`;
      div.addEventListener('mousedown', (e) => { e.preventDefault(); selectLocation(fullAddr, displayLabel); });
      dd.appendChild(div);
    });
  } catch(e) {
    if (dd) dd.innerHTML = '<div class="location-searching">Search unavailable</div>';
  }
}

function selectLocation(fullAddr, displayLabel) {
  const inp = document.getElementById('loc-input');
  if (inp) inp.value = fullAddr;
  if (window._editDraft) {
    window._editDraft.location = fullAddr;
    window._editDraft.locationDisplay = displayLabel || fullAddr;
  }
  console.log('selectLocation called:', {fullAddr, displayLabel, stored: window._editDraft?.locationDisplay});
  closeLocationDropdown();
}

function closeLocationDropdown() {
  const dd = document.getElementById('loc-dropdown');
  if (dd) dd.style.display = 'none';
}

function detailsInput(inp) {
  const opts = JSON.parse(inp.dataset.opts || '[]');
  const val = inp.value;
  const wrapId = inp.closest('.details-wrap')?.id;
  if (!wrapId) return;

  // If value exactly matches an option, show all options
  const exactMatch = opts.includes(val);
  const filtered = exactMatch ? opts : opts.filter(o => o.toLowerCase().includes(val.toLowerCase()));

  closeDetailsDropdown(wrapId);
  if (!filtered.length) return;

  const ti = inp.dataset.ti, ii = inp.dataset.ii;
  const wrap = document.getElementById(wrapId);

  drop.id = wrapId + '-dd';

    const div = document.createElement('div');
    div.className = 'details-opt';

    div.onmousedown = () => {

      onDetailChange(parseInt(ti), parseInt(ii), o);

// ── Bottom sheet drag to dismiss ──
(function() {
  let sheetStartY = 0, sheetDragging = false, sheetCurrentY = 0;

  function getSheet() { return document.getElementById('mobileItemSheet'); }
  function getModal() { return document.getElementById('mobileItemModal'); }

  function onSheetTouchStart(e) {
    if (e.touches.length !== 1) return;
    sheetStartY = e.touches[0].clientY;
    sheetCurrentY = 0;
    sheetDragging = true;
    const sheet = getSheet();
    if (sheet) sheet.style.transition = 'none';
  }

  function onSheetTouchMove(e) {
    if (!sheetDragging) return;
    const dy = e.touches[0].clientY - sheetStartY;
    if (dy <= 0) return;
    sheetCurrentY = dy;
    const sheet = getSheet();
    if (sheet) sheet.style.transform = `translateY(${dy}px)`;
    const modal = getModal();
    if (modal) modal.style.background = `rgba(0,0,0,${Math.max(0, 0.6 - dy/300)})`;
  }

  function onSheetTouchEnd(e) {
    if (!sheetDragging) return;
    sheetDragging = false;
    const sheet = getSheet();
    if (!sheet) return;
    sheet.style.transition = 'transform 0.28s cubic-bezier(0.4,0,0.2,1)';
    if (sheetCurrentY > 120) {
      sheet.style.transform = 'translateY(100%)';
      setTimeout(() => {
        sheet.style.transform = '';
        sheet.style.transition = '';
        closeMobileItemModal();
      }, 280);
    } else {
      sheet.style.transform = '';
      const modal = getModal();
      if (modal) modal.style.background = '';
      setTimeout(() => { if(sheet) sheet.style.transition = ''; }, 300);
    }
  }

  // Attach listeners directly to handle and header, not document
  document.addEventListener('DOMContentLoaded', () => {}, false);
  // Use a MutationObserver to attach when elements exist
  function attachSheetListeners() {
    // Re-attach every time (elements may be recreated)
    const handle = document.getElementById('mobileSheetHandle');
    const header = document.getElementById('mobileItemSheetHeader');
    [handle, header].forEach(el => {
      if (!el) return;
      // Remove old listeners first to avoid duplicates
      el.removeEventListener('touchstart', onSheetTouchStart);
      el.removeEventListener('touchmove', onSheetTouchMove);
      el.removeEventListener('touchend', onSheetTouchEnd);
      el.addEventListener('touchstart', onSheetTouchStart, { passive: true });
      el.addEventListener('touchmove', onSheetTouchMove, { passive: true });
      el.addEventListener('touchend', onSheetTouchEnd, { passive: true });
    });
  }

  // Expose for manual call
  window.attachSheetListeners = attachSheetListeners;
})();

    const db = parseDateStr(b.startDate || b.date);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });

  const html = sorted.map(t => {
    const theme = getCategoryTheme(t);
    const emoji = theme ? theme.emoji : '📌';
    const color = theme ? theme.text : 'var(--text)';
    const dateStr = t.startDate ? formatDateDisplay(t.startDate) : (t.date || '');
    const loc = locationDisplayStr(t);
    return `<div class="list-view-item">
      <span style="font-size:16px;flex-shrink:0">${emoji}</span>
      <span style="font-size:14px;font-weight:700;color:${color};flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:uppercase;letter-spacing:0.03em">${esc(t.name)}</span>
      <span style="font-size:12px;color:var(--text-tertiary);flex-shrink:0;text-align:right">${dateStr}${loc ? ' · ' + esc(loc) : ''}</span>
    </div>`;
  }).join('') || '<div style="padding:24px;text-align:center;color:var(--text-tertiary)">No trips yet</div>';

  document.getElementById('listViewContent').innerHTML = html;
  document.getElementById('listModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// ── Category filter ──
let activeFilters = new Set(); // empty = show all

function renderFilterPills() {
  const cats = Object.entries(CATEGORY_THEME);
  // Include Custom if any trips use it
  const hasTBD = trips.some(t => !t.category);
  const container = document.getElementById('filterPills');
  if (!container) return;

  let html = `<span class="filter-pill${activeFilters.size===0?' active':''}" onclick="toggleFilter(null)">All</span>`;
  cats.forEach(([cat, theme]) => {
    const hasAny = trips.some(t => t.category === cat);
    if (!hasAny) return;
    const isActive = activeFilters.has(cat);
    html += `<span class="filter-pill${isActive?' active':''}" onclick="toggleFilter('${cat}')" style="${isActive?'':'border-color:'+theme.border+';color:'+theme.text}">${theme.emoji} ${cat}</span>`;
  });
  if (hasTBD) {
    const isActive = activeFilters.has('');
    html += `<span class="filter-pill${isActive?' active':''}" onclick="toggleFilter('')">📌 TBD</span>`;
  }
  container.innerHTML = html;
}

function toggleFilter(cat) {
  if (cat === null) {
    activeFilters.clear();
  } else {
    if (activeFilters.has(cat)) activeFilters.delete(cat);
    else activeFilters.add(cat);
  }
  renderFilterPills();
  renderAll();
  updateStats();
}

function passesFilter(trip) {
  if (activeFilters.size === 0) return true;
  const cat = trip.category || '';
  return activeFilters.has(cat);
}

  const wrapId = 'add-dw-' + ti;
  const exactMatch = opts.includes(val);
  const filtered = exactMatch ? opts : opts.filter(o => o.toLowerCase().includes(val.toLowerCase()));
  closeDetailsDropdown(wrapId);
  if (!filtered.length) return;
  const wrap = document.getElementById(wrapId);
  const drop = document.createElement('div');
  drop.className = 'details-dropdown';
  drop.id = wrapId + '-dd';

async function commitAddReq(ti) {
  const sel = document.getElementById('add-req-input-' + ti);
  const customInp = document.getElementById('add-req-custom-' + ti);
  if (!sel) return;
  const name = (sel.value === 'custom' ? (customInp?.value || '') : sel.value).trim();
  if (!name) { (sel.value === 'custom' ? customInp : sel)?.focus(); showToast('Please enter an activity name'); return; }
  const dateStart = (document.getElementById('add-req-date-' + ti) || {}).value || '';
  const dateEnd   = (document.getElementById('add-req-date-end-' + ti) || {}).value || '';
  const status    = (document.getElementById('add-req-status-' + ti) || {}).value || 'Not Booked';
  const details   = (document.getElementById('add-req-details-' + ti) || {}).value || '';
  const notes     = (document.getElementById('add-req-notes-' + ti) || {}).value || '';
  const linkUrl   = (document.getElementById('add-req-linkurl-' + ti) || {}).value.trim() || '';
  const linkText  = (document.getElementById('add-req-linktext-' + ti) || {}).value.trim() || '';
  trips[ti].items.push({name, date:'', dateStart, dateEnd, status, details, notes, linkUrl, linkText});
  expanded[ti] = true;
  updateStats(); updateTabCounts(); renderAll();
  await persist();
  showToast('Activity added');
}

function handleAddReqKey(e, ti) {
  if (e.key === 'Enter') commitAddReq(ti);
  if (e.key === 'Escape') cancelAddReq(ti);
}

}

  trips.splice(editingIdx,1);

}

function calShift(dir) {
  const track = document.getElementById('calTrack');
  const currentSlide = document.getElementById('calGrid');
  if (!track || !currentSlide) return;

  // Build next month's HTML
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }

  const nextSlide = document.createElement('div');
  nextSlide.className = 'cal-slide';
  nextSlide.id = 'calGrid';

  // Temporarily render into nextSlide
  const tempId = 'calGrid';
  nextSlide.id = 'calGrid-next';
  track.appendChild(nextSlide);

  // Swap id so renderCal writes into nextSlide
  currentSlide.id = 'calGrid-prev';
  nextSlide.id = 'calGrid';
  renderCal();
  nextSlide.id = 'calGrid-next';
  currentSlide.id = 'calGrid';

  // Position next slide off-screen
  if (dir > 0) {
    track.appendChild(nextSlide);
    track.style.transition = 'none';
    track.style.transform = 'translateX(0)';
  } else {
    track.insertBefore(nextSlide, currentSlide);
    track.style.transition = 'none';
    track.style.transform = 'translateX(-100%)';
  }

  // Force reflow
  track.getBoundingClientRect();

  // Animate
  track.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1)';
  track.style.transform = dir > 0 ? 'translateX(-100%)' : 'translateX(0)';

  track.addEventListener('transitionend', () => {
    // Cleanup: remove old slide, reset track
    if (dir > 0) {
      track.removeChild(currentSlide);
    } else {
      track.removeChild(currentSlide);
    }
    nextSlide.id = 'calGrid';
    track.style.transition = 'none';
    track.style.transform = 'translateX(0)';
    // Update title and legend
    renderCal();
  }, { once: true });
}

function renderCal() {
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('calTitle').textContent = MONTHS[calMonth] + ' ' + calYear;

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  const monthStart = new Date(calYear, calMonth, 1);
  const monthEnd = new Date(calYear, calMonth, daysInMonth);

  // Assign each trip a color and find which overlap this month
  let colorIdx = 0;
  const tripMeta = trips.map((trip, ti) => {
    const theme = getCategoryTheme(trip);
    const color = theme ? theme.color : '#9e9d9b';
    const textColor = color;
    // Collect all dates: trip date + all activity start/end dates
    const tripDate = parseDateStr(trip.startDate || trip.date);
    const allDates = [tripDate].filter(Boolean);
    trip.items.forEach(it => {
      const ds = parseDateStr(it.dateStart || it.date);
      const de = parseDateStr(it.dateEnd);
      if (ds) allDates.push(ds);
      if (de) allDates.push(de);
    });
    if (!allDates.length) return null;
    // Start = earliest date, End = latest date
    const start = new Date(Math.min(...allDates));
    const end = new Date(Math.max(...allDates));
    if (!start) return null;
    return { trip, ti, color, textColor, start, end };
  }).filter(Boolean);

  // Filter to trips that overlap this month, sort by start date (earliest first)
  const visible = tripMeta
    .filter(m => m.start <= monthEnd && m.end >= monthStart)
    .sort((a, b) => a.start - b.start);

  // Build event map: day number -> array of events
  const eventMap = {};
  // Build extended event map including prev/next month overflow cells
  // prevMonth days: negative keys (-firstDay+1 to 0)
  // nextMonth days: daysInMonth+1 to daysInMonth+remaining
  const prevYear = calMonth === 0 ? calYear - 1 : calYear;
  const prevMonthIdx = calMonth === 0 ? 11 : calMonth - 1;
  const nextYear = calMonth === 11 ? calYear + 1 : calYear;
  const nextMonthIdx = calMonth === 11 ? 0 : calMonth + 1;

  function dateToKey(date) {
    const y = date.getFullYear(), mo = date.getMonth(), d = date.getDate();
    if (y === calYear && mo === calMonth) return d;
    if (y === prevYear && mo === prevMonthIdx) return d - daysInPrev - 1; // negative
    if (y === nextYear && mo === nextMonthIdx) return daysInMonth + d;
    return null;
  }

  visible.forEach(m => {
    const startKey = dateToKey(m.start);
    const endKey = dateToKey(m.end);
    if (startKey === null && endKey === null) return;
    const s = startKey !== null ? startKey : -(daysInPrev);
    const e = endKey !== null ? endKey : daysInMonth + 6;
    // Include prev month cells (negative keys) and next month cells
    const minKey = -(firstDay);
    const maxKey = daysInMonth + 6;
    for (let dk = Math.max(s, minKey); dk <= Math.min(e, maxKey); dk++) {
      if (!eventMap[dk]) eventMap[dk] = [];
      const isStart = dk === s;
      const isEnd = dk === e;
      const isOtherMonth = dk < 1 || dk > daysInMonth;
      eventMap[dk].push({ ...m, isStart, isEnd, spanStart: s, spanEnd: e, isOtherMonth });
    }
  });

  // Build grid
  let html = '<div class="cal-grid">';
  DAYS.forEach(d => { html += `<div class="cal-day-label">${d}</div>`; });

  let cell = 0;
  for (let i = 0; i < firstDay; i++, cell++) {
    const dk = i - firstDay + 1; // negative key
    const d = daysInPrev - firstDay + 1 + i;
    const pevents = eventMap[dk] || [];
    let pevHtml = pevents.slice(0,3).map(({trip, ti: tripIdx, color, isStart, isEnd, spanStart, spanEnd}) => {
      const lum = parseInt(color.slice(1),16); const r=(lum>>16)&255,g=(lum>>8)&255,b=lum&255;
      const bright = (r*299+g*587+b*114)/1000;
      const txtColor = bright > 160 ? '#1a1a1a' : '#ffffff';
      const ml = isStart ? '0' : '-1px'; const mr = isEnd ? '0' : '-1px';
      const bl = isStart ? '3px' : '0'; const er = isEnd ? '3px' : '0';
      const borderRadius = `${bl} ${er} ${er} ${bl}`;
      const evTheme = trip.category ? CATEGORY_THEME[trip.category] : null;
      const emoji = evTheme ? evTheme.emoji : '📌';
      const col2 = cell % 7;
      const cellsToRowEnd = 7 - col2;
      const cellsInSpan = Math.min(spanEnd - dk + 1, cellsToRowEnd);
      const showLabel = isStart;
      const labelStyle = showLabel ? `position:absolute;left:4px;top:0;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:calc(${cellsInSpan*100}% + ${(cellsInSpan-1)}px - 4px);z-index:3;line-height:22px;opacity:0.5` : 'display:none';
      const labelEl = `<span style="${labelStyle}">${showLabel ? emoji+' '+esc(trip.name) : ''}</span>`;
      return `<div class="cal-event" style="background:${color};color:${txtColor};border-radius:${borderRadius};margin:0 ${mr} 2px ${ml};position:relative;overflow:visible;opacity:0.35" onclick="event.stopPropagation();openCalPopup(${tripIdx})">${labelEl}</div>`;
    }).join('');
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div>${pevHtml}</div>`;
  }
  for (let d = 1; d <= daysInMonth; d++, cell++) {
    const isToday = TODAY.getDate() === d && TODAY.getMonth() === calMonth && TODAY.getFullYear() === calYear;
    const events = eventMap[d] || [];
    let evHtml = events.slice(0, 3).map(({trip, ti: tripIdx, color, isStart, isEnd, spanStart, spanEnd}) => {
      const lum = parseInt(color.slice(1),16); const r=(lum>>16)&255,g=(lum>>8)&255,b=lum&255;
      const bright = (r*299+g*587+b*114)/1000;
      const txtColor = bright > 160 ? '#1a1a1a' : '#ffffff';
      const ml = isStart ? '0' : '-1px';
      const mr = isEnd ? '0' : '-1px';
      const bl = isStart ? '3px' : '0';
      const er = isEnd ? '3px' : '0';
      const borderRadius = `${bl} ${er} ${er} ${bl}`;
      // Bar: colored background, no text (text handled via overlay)
      const showLabel = isStart;
      const col = cell % 7;
      const cellsToRowEnd = 7 - col;
      const cellsInSpan = Math.min(spanEnd - d + 1, cellsToRowEnd);
      // Label width spans N cells. Each cell is 1/7 of grid width.
      // We go from left edge of this cell to right edge of last cell in span.
      const labelStyle = showLabel
        ? `position:absolute;left:4px;top:0;right:0;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:calc(${cellsInSpan * 100}% + ${(cellsInSpan-1) * 1}px - 4px);z-index:3;line-height:22px;`
        : 'display:none';
      const evTheme = trip.category ? CATEGORY_THEME[trip.category] : null;
      const emoji = evTheme ? evTheme.emoji : '📌';
      const labelEl = `<span style="${labelStyle}">${showLabel ? emoji + ' ' + esc(trip.name) : ''}</span>`;
      return `<div class="cal-event" style="background:${color};color:${txtColor};border-radius:${borderRadius};margin:0 ${mr} 2px ${ml};position:relative;overflow:visible" title="${esc(trip.name)}" onclick="event.stopPropagation();openCalPopup(${tripIdx})">${labelEl}</div>`;
    }).join('');
    if (events.length > 3) evHtml += `<div style="font-size:9px;color:var(--text-tertiary)">+${events.length-3}</div>`;
    html += `<div class="cal-day${isToday?' today':''}"><div class="cal-day-num">${d}</div>${evHtml}</div>`;
  }
  const remaining = (7 - (cell % 7)) % 7;
  for (let d = 1; d <= remaining; d++, cell++) {
    const dk = daysInMonth + d;
    const nevents = eventMap[dk] || [];
    let nevHtml = nevents.slice(0,3).map(({trip, ti: tripIdx, color, isStart, isEnd, spanStart, spanEnd}) => {
      const lum = parseInt(color.slice(1),16); const r=(lum>>16)&255,g=(lum>>8)&255,b=lum&255;
      const bright = (r*299+g*587+b*114)/1000;
      const txtColor = bright > 160 ? '#1a1a1a' : '#ffffff';
      const ml = isStart ? '0' : '-1px'; const mr = isEnd ? '0' : '-1px';
      const bl = isStart ? '3px' : '0'; const er = isEnd ? '3px' : '0';
      const borderRadius = `${bl} ${er} ${er} ${bl}`;
      const evTheme = trip.category ? CATEGORY_THEME[trip.category] : null;
      const emoji = evTheme ? evTheme.emoji : '📌';
      const col2 = cell % 7;
      const cellsToRowEnd = 7 - col2;
      const cellsInSpan = Math.min(spanEnd - dk + 1, cellsToRowEnd);
      const showLabel = isStart;
      const labelStyle = showLabel ? `position:absolute;left:4px;top:0;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:calc(${cellsInSpan*100}% + ${(cellsInSpan-1)}px - 4px);z-index:3;line-height:22px;opacity:0.5` : 'display:none';
      const labelEl = `<span style="${labelStyle}">${showLabel ? emoji+' '+esc(trip.name) : ''}</span>`;
      return `<div class="cal-event" style="background:${color};color:${txtColor};border-radius:${borderRadius};margin:0 ${mr} 2px ${ml};position:relative;overflow:visible;opacity:0.35" onclick="event.stopPropagation();openCalPopup(${tripIdx})">${labelEl}</div>`;
    }).join('');
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div>${nevHtml}</div>`;
  }
  html += '</div>';
  document.getElementById('calGrid').innerHTML = html;

  // Legend - only trips visible this month
  // Build unique category legend
  const seenCats = new Set();
  const legendItems = [];
  visible.forEach(({trip, color}) => {
    const cat = trip.category || 'TBD';
    const theme = getCategoryTheme(trip);
    const emoji = theme ? theme.emoji : '📌';
    const key = cat;
    if (!seenCats.has(key)) {
      seenCats.add(key);
      legendItems.push({color, emoji, cat});
    }
  });
  document.getElementById('calLegend').innerHTML = legendItems.map(({color, emoji, cat}) =>
    `<div class="cal-legend-item"><div class="cal-legend-dot" style="background:${color}"></div>${emoji} ${esc(cat)}</div>`
  ).join('');
}

let _map = null;

async function openMapModal() {
  document.getElementById('mapModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  const container = document.getElementById('mapContainer');
  if (!container) return;
  // Show loading spinner immediately
  container.innerHTML = '<div class="map-loading"><div class="map-spinner"></div><span>Loading map…</span></div>';

  // Collect trips with geocoded locations
  const toGeocode = trips.filter(t => t.location && !t._latlng);

  // Geocode any missing locations via Nominatim
  for (const trip of toGeocode) {
    try {
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(trip.location)}&format=json&limit=1`;
      const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
      const data = await res.json();
      if (data[0]) trip._latlng = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
    } catch(e) {}
  }

  const pinned = trips.filter(t => t._latlng);
  if (!pinned.length) {
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);font-size:14px">No locations to show</div>';
    return;
  }

  // Load Leaflet if needed
  if (!window.L) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      s.onload = () => {
        const s2 = document.createElement('script');
        s2.src = 'https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js';
        s2.onload = res; s2.onerror = rej;
        document.head.appendChild(s2);
      };
      s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  // Init or reset map
  if (_map) { _map.remove(); _map = null; }
  container.style.background = '';
  container.innerHTML = '';

  _map = L.map(container, { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(_map);
  const clusterGroup = L.markerClusterGroup({ maxClusterRadius: 50 });

  const bounds = L.latLngBounds();
  pinned.forEach(trip => {
    const theme = getCategoryTheme(trip);
    const color = theme ? theme.color : '#9e9d9b';
    const display = locationDisplayStr(trip) || trip.name;

    const icon = L.divIcon({
      className: '',
      html: `<div style="background:${color};color:#fff;border-radius:50% 50% 50% 0;width:28px;height:28px;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center">
        <span style="transform:rotate(45deg);font-size:13px">${theme ? theme.emoji : '📌'}</span></div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 28],
      popupAnchor: [0, -30],
    });

    const marker = L.marker(trip._latlng, { icon });
    const dateStr = trip.startDate ? (() => {
      const d = new Date(trip.startDate + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    })() : (trip.date || '');
    marker.bindPopup(`<strong>${esc(trip.name)}</strong>${dateStr ? `<br><small>📅 ${dateStr}</small>` : ''}<br><small>📍 ${esc(display)}</small>`);
    marker.on('click', (e) => {
      // Only fly if not currently spiderfied (check if marker is in a spiderfy state)
      const parent = clusterGroup.getVisibleParent(marker);
      const isSpiderfied = !parent || parent === marker;
      if (isSpiderfied) {
        // Only zoom in, never zoom out
        const currentZoom = _map.getZoom();
        if (currentZoom < 10) {
          _map.flyTo(trip._latlng, 10, { duration: 0.8, animate: true });
        }
      }
    });
    clusterGroup.addLayer(marker);
    bounds.extend(trip._latlng);
  });

  clusterGroup.addTo(_map);
  const initialBounds = bounds;
  _map.fitBounds(bounds, { padding: [40, 40], maxZoom: 10 });

  // Add reset view button
  const resetBtn = L.control({ position: 'topleft' });
  resetBtn.onAdd = () => {
    const btn = L.DomUtil.create('button', 'leaflet-bar leaflet-control');
    btn.innerHTML = '⊞';
    btn.title = 'Reset view';
    btn.style.cssText = 'width:30px;height:30px;font-size:18px;cursor:pointer;background:#fff;border:none;display:flex;align-items:center;justify-content:center;';
    L.DomEvent.on(btn, 'click', (e) => {
      L.DomEvent.stopPropagation(e);
      _map.flyToBounds(initialBounds, { padding: [40, 40], maxZoom: 10, duration: 0.8 });
    });
    return btn;
  };
  resetBtn.addTo(_map);
}

// ── Calendar swipe ──
(function() {
  let startX = 0, startY = 0, swiping = false;

  function getCalModal() { return document.getElementById('calendarModal'); }

  document.addEventListener('touchstart', e => {
    const modal = getCalModal();
    if (!modal || !modal.classList.contains('open')) return;
    if (!e.target.closest('.cal-slider, .cal-grid')) return;
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = false;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    const modal = getCalModal();
    if (!modal || !modal.classList.contains('open')) return;
    if (!e.target.closest('.cal-slider, .cal-grid')) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!swiping && Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) {
      swiping = true;
    }
    // Live drag feedback
    if (swiping) {
      const track = document.getElementById('calTrack');
      if (track) {
        track.style.transition = 'none';
        track.style.transform = `translateX(${dx * 0.4}px)`;
      }
    }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const modal = getCalModal();
    if (!modal || !modal.classList.contains('open')) return;
    const track = document.getElementById('calTrack');
    if (!swiping) {
      swiping = false;
      return;
    }
    const dx = e.changedTouches[0].clientX - startX;
    if (track) { track.style.transition = ''; track.style.transform = ''; }
    if (Math.abs(dx) > 50) {
      calShift(dx < 0 ? 1 : -1);
    }
    swiping = false;
  }, { passive: true });
})();

// ── Swipe gesture support ──
(function() {
  const SWIPE_TABS = ['upcoming', 'all', 'past'];
  let startX = 0, startY = 0, isDragging = false, isHoriz = null;
  let dragOffset = 0;

  function getTrack() { return document.getElementById('sliderTrack'); }
  function panelWidth() { return document.getElementById('sliderViewport').offsetWidth; }

  function baseOffset() {
    return -SWIPE_TABS.indexOf(activeTab) * (100 / 3);
  }

  function applyOffset(extra) {
    const track = getTrack();
    if (!track) return;
    track.style.transform = `translateX(calc(${baseOffset()}% + ${extra}px))`;
  }

  document.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    // Don't activate page swipe if a modal is open
    if (document.querySelector('.modal-backdrop.open')) return;
    // Only activate swipe if touch starts in the slider area, not on sticky header or filter pills
    const stickyHeader = document.querySelector('.sticky-header');
    if (stickyHeader && stickyHeader.contains(e.target)) return;
    if (e.target.closest('.filter-pills-wrap')) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = false;
    isHoriz = null;
    dragOffset = 0;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (e.touches.length !== 1) return;
    if (document.querySelector('.modal-backdrop.open')) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    if (isHoriz === null) {
      if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
      isHoriz = Math.abs(dx) > Math.abs(dy);
    }

    if (!isHoriz) return;

    // Only now activate dragging state (show panels, add dragging class)
    if (!isDragging) {
      const track = getTrack();
      if (track) track.classList.add('dragging');
      TABS.forEach(t => { const p = document.getElementById('panel-' + t); if (p) p.classList.remove('inactive'); });
    }
    isDragging = true;
    const cur = SWIPE_TABS.indexOf(activeTab);

    // Resist at edges
    let limited = dx;
    if (dx > 0 && cur === 0) limited = dx * 0.2;
    if (dx < 0 && cur === TABS.length - 1) limited = dx * 0.2;

    dragOffset = limited;
    applyOffset(dragOffset);
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const track = getTrack();
    if (track) track.classList.remove('dragging');

    if (!isDragging) { isDragging = false; isHoriz = null; return; }
    isDragging = false; isHoriz = null;

    const cur = SWIPE_TABS.indexOf(activeTab);
    const threshold = panelWidth() * 0.25;

    if (dragOffset < -threshold && cur < TABS.length - 1) {
      setTab(SWIPE_TABS[cur + 1]);
      const hint = document.getElementById('swipeHint');
      if (hint) hint.style.display = 'none';
    } else if (dragOffset > threshold && cur > 0) {
      setTab(TABS[cur - 1]);
      const hint = document.getElementById('swipeHint');
      if (hint) hint.style.display = 'none';
    } else {
      // Snap back
      if (track) {
        track.classList.remove('dragging');
        applyOffset(0);
      }
    }
    dragOffset = 0;
    positionTrack();
  }, { passive: true });
})();

// ── Scroll chaining for trip-items ──
document.addEventListener('wheel', function(e) {
  const el = e.target.closest('.trip-items');
  if (!el) return;
  const atTop = el.scrollTop === 0;
  const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 1;
  if ((e.deltaY < 0 && atTop) || (e.deltaY > 0 && atBottom)) {
    e.preventDefault();
    window.scrollBy(0, e.deltaY);
  }
}, { passive: false });

// ── Scroll back if element is hidden behind sticky header after keyboard dismisses ──
document.addEventListener('focusout', e => {
  const tag = e.target.tagName;
  if (tag !== 'INPUT' && tag !== 'SELECT' && tag !== 'TEXTAREA') return;
  const stickyHeader = document.querySelector('.sticky-header');
  const headerH = stickyHeader ? stickyHeader.offsetHeight : 0;
  const rect = e.target.getBoundingClientRect();
  if (rect.top < headerH + 8) {
    window.scrollBy({ top: rect.top - headerH - 16, behavior: 'smooth' });
  }
}, true);

// ── Init ──
updateStats(); updateTabCounts(); renderAll(); renderFilterPills();
