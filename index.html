<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Travel Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #eeede8;
    --text: #1a1a18; --text-secondary: #5f5e5a; --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12); --border-secondary: rgba(0,0,0,0.22);
    --radius-md: 8px; --radius-lg: 12px;
    --green-text: #3b6d11; --amber-text: #854f0b;
    --danger-bg: #fcebeb; --danger-text: #a32d2d;
    --info-bg: #e6f1fb; --info-text: #185fa5;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2b;
      --text: #f0ede6; --text-secondary: #a8a79f; --text-tertiary: #6e6d68;
      --border: rgba(255,255,255,0.1); --border-secondary: rgba(255,255,255,0.18);
      --green-text: #97c459; --amber-text: #ef9f27;
      --danger-bg: #2a1010; --danger-text: #f09595;
      --info-bg: #0c1e30; --info-text: #85b7eb;
    }
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg-tertiary); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; }
  .page { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 1.75rem; }
  h1 { font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .page-sub { font-size: 14px; color: var(--text-secondary); margin-top: 3px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .sync-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); margin-bottom: 1.25rem; min-height: 22px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.connected { background: var(--green-text); }
  .sync-dot.syncing { background: var(--amber-text); }
  .sync-dot.error { background: var(--danger-text); }

  .setup-banner { background: var(--info-bg); border: 0.5px solid var(--border-secondary); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 1.5rem; }
  .setup-banner h2 { font-size: 15px; font-weight: 500; color: var(--info-text); margin-bottom: 6px; }
  .setup-banner p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.75rem; }
  .stat { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--text); }
  .stat-value.green { color: var(--green-text); }
  .stat-value.amber { color: var(--amber-text); }

  .trip-list { display: flex; flex-direction: column; gap: 10px; }
  .trip-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .trip-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .trip-header:hover { background: var(--bg-secondary); }
  .month-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .trip-meta { flex: 1; min-width: 0; }
  .trip-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .trip-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .past-trip .trip-name { color: var(--text-secondary); }
  .past-badge { font-size: 11px; background: var(--bg-secondary); color: var(--text-tertiary); border-radius: 4px; padding: 2px 6px; }
  .trip-date-label { font-size: 13px; color: var(--text-secondary); }
  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-bar { width: 56px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .progress-text { font-size: 12px; color: var(--text-secondary); min-width: 28px; text-align: right; }

  .btn { font-size: 13px; padding: 6px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-secondary); background: transparent; color: var(--text); cursor: pointer; transition: background 0.15s; white-space: nowrap; font-family: inherit; }
  .btn:hover { background: var(--bg-secondary); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; font-weight: 500; }
  .btn-primary:hover { opacity: 0.85; background: var(--text); }
  .btn-sm { font-size: 12px; padding: 4px 10px; }
  .btn-danger { color: var(--danger-text); }
  .btn-danger:hover { background: var(--danger-bg); }

  .chevron { font-size: 11px; color: var(--text-tertiary); margin-left: 2px; transition: transform 0.2s; display: inline-block; }
  .trip-items { border-top: 0.5px solid var(--border); }
  .col-header { display: grid; grid-template-columns: 1fr 150px 1fr; gap: 12px; padding: 7px 16px; background: var(--bg-secondary); }
  .col-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
  .item-row { display: grid; grid-template-columns: 1fr 150px 1fr; align-items: center; gap: 12px; padding: 10px 16px; border-top: 0.5px solid var(--border); }
  .item-name { font-size: 14px; color: var(--text); }
  .item-date-lbl { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .item-details-lbl { font-size: 13px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-select { font-size: 13px; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); padding: 5px 8px; background: var(--bg); color: var(--text); cursor: pointer; width: 100%; font-family: inherit; }

  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg); border: 0.5px solid var(--border-secondary); border-radius: var(--radius-lg); width: 100%; max-width: 620px; overflow: hidden; margin: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 0.5px solid var(--border); }
  .modal-title { font-size: 16px; font-weight: 500; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px; font-family: inherit; }
  .modal-close:hover { background: var(--bg-secondary); }
  .modal-body { padding: 20px; }
  .field-group { margin-bottom: 14px; }
  .field-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; display: block; }
  .field-input { font-size: 14px; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); padding: 8px 10px; background: var(--bg); color: var(--text); width: 100%; font-family: inherit; }
  .field-input:focus { outline: none; border-color: var(--text-secondary); }
  .trip-fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .section-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin: 20px 0 10px; }
  .section-label:first-child { margin-top: 0; }
  .items-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .items-table th { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 8px; text-align: left; border-bottom: 0.5px solid var(--border); font-weight: 500; }
  .items-table td { padding: 5px 4px; vertical-align: middle; }
  .items-table tr:not(:last-child) td { border-bottom: 0.5px solid var(--border); }
  .table-input { font-size: 13px; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); padding: 5px 7px; background: var(--bg); color: var(--text); width: 100%; font-family: inherit; }
  .table-input:focus { outline: none; border-color: var(--text-secondary); }
  .table-select { font-size: 13px; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); padding: 5px 6px; background: var(--bg); color: var(--text); width: 100%; font-family: inherit; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text-tertiary); font-size: 18px; padding: 2px 6px; line-height: 1; border-radius: 4px; font-family: inherit; }
  .del-btn:hover { color: var(--danger-text); background: var(--danger-bg); }
  .add-row-btn { font-size: 13px; padding: 7px 12px; color: var(--text-secondary); background: transparent; border: 0.5px dashed var(--border-secondary); border-radius: var(--radius-md); cursor: pointer; width: 100%; margin-top: 10px; text-align: center; font-family: inherit; transition: background 0.15s; }
  .add-row-btn:hover { background: var(--bg-secondary); }
  .modal-footer { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-top: 0.5px solid var(--border); gap: 8px; }
  .modal-footer-right { display: flex; gap: 8px; }

  .add-trip-area { margin-top: 1.25rem; }
  .add-trip-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 12px; border: 0.5px dashed var(--border-secondary); border-radius: var(--radius-lg); background: transparent; color: var(--text-secondary); font-size: 14px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .add-trip-btn:hover { background: var(--bg-secondary); color: var(--text); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--bg); border-radius: var(--radius-md); padding: 10px 16px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; pointer-events: none; z-index: 2000; }
  .toast.show { opacity: 1; transform: translateY(0); }

  .tab-nav { display: flex; gap: 2px; background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 4px; margin-bottom: 1.5rem; width: fit-content; }
  .tab-btn { font-size: 13px; font-weight: 500; padding: 7px 18px; border-radius: 9px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { background: var(--bg); color: var(--text); border: 0.5px solid var(--border); }
  .tab-count { font-size: 11px; font-weight: 400; margin-left: 5px; opacity: 0.6; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); font-size: 14px; }

  .tab-nav-wrap { position: relative; }
  .swipe-hint { display: none; font-size: 11px; color: var(--text-tertiary); text-align: center; margin-top: 6px; letter-spacing: 0.02em; }

  @media (max-width: 600px) {
    .col-header { display: none; }
    .item-row { grid-template-columns: 1fr; }
    .trip-fields-grid { grid-template-columns: 1fr; }
    .tab-nav { width: 100%; }
    .tab-btn { flex: 1; text-align: center; padding: 7px 8px; }
    .swipe-hint { display: block; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div>
      <h1>2026 Travel</h1>
      <div class="page-sub">Track your trips and requirements</div>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="expandAll()">Expand all</button>
      <button class="btn" onclick="collapseAll()">Collapse all</button>
      <button class="btn" onclick="exportCSV()">Export ↗</button>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">Not connected</span>
  </div>

  <div id="setupBanner"></div>
  <div class="stats" id="stats"></div>

  <div class="tab-nav-wrap">
    <nav class="tab-nav" id="tabNav">
      <button class="tab-btn active" onclick="setTab('upcoming')" id="tab-upcoming">Upcoming <span class="tab-count" id="cnt-upcoming"></span></button>
      <button class="tab-btn" onclick="setTab('all')" id="tab-all">All trips <span class="tab-count" id="cnt-all"></span></button>
      <button class="tab-btn" onclick="setTab('past')" id="tab-past">Past <span class="tab-count" id="cnt-past"></span></button>
    </nav>
    <div class="swipe-hint" id="swipeHint">&#8592; swipe to switch tabs &#8594;</div>
  </div>

  <div class="trip-list" id="tripList"></div>
  <div class="add-trip-area">
    <button class="add-trip-btn" onclick="openAddTrip()">+ Add trip</button>
  </div>
</div>

<!-- Trip modal -->
<div class="modal-backdrop" id="tripModal" onclick="handleBackdropClick(event,'tripModal')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="tripModalTitle">Edit trip</span>
      <button class="modal-close" onclick="closeModal('tripModal')">&#215;</button>
    </div>
    <div class="modal-body" id="tripModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="delTripBtn" onclick="deleteTrip()">Delete trip</button>
      <div class="modal-footer-right">
        <button class="btn" onclick="closeModal('tripModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveTrip()">Save changes</button>
      </div>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-backdrop" id="settingsModal" onclick="handleBackdropClick(event,'settingsModal')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Firebase settings</span>
      <button class="modal-close" onclick="closeModal('settingsModal')">&#215;</button>
    </div>
    <div class="modal-body" id="settingsBody"></div>
    <div class="modal-footer">
      <div></div>
      <div class="modal-footer-right">
        <button class="btn" onclick="closeModal('settingsModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveSettings()">Connect</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const MONTH_COLORS = ['#378ADD','#E24B4A','#1D9E75','#D4537E','#639922','#0F6E56','#D85A30','#BA7517','#534AB7','#5F5E5A','#985EA5','#0C447C'];

const CFG_KEY = 'travelFbCfg';

let trips = JSON.parse(JSON.stringify(DEFAULT_TRIPS));
let expanded = {};
let editingIdx = null;
let editDraft = null;
let db = null;
let unsub = null;
let writing = false;
let activeTab = 'upcoming';

// ── Firebase ──
function getCfg() { try { return JSON.parse(localStorage.getItem(CFG_KEY)||'null'); } catch(e) { return null; } }
function setCfg(c) { try { localStorage.setItem(CFG_KEY, JSON.stringify(c)); } catch(e) {} }

async function connect(cfg) {
  setSyncState('syncing','Connecting…');
  try {
    const app = initializeApp(cfg, 'travelApp');
    db = getFirestore(app);
    const ref = doc(db, ...DOC_PATH);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      trips = snap.data().trips || trips;
    } else {
      await setDoc(ref, { trips });
    }
    updateStats(); updateTabCounts(); renderAll();
    setSyncState('connected','Connected · syncing live');
    if (unsub) unsub();
    unsub = onSnapshot(ref, s => {
      if (writing) return;
      const r = s.data()?.trips;
      if (r) { trips = r; updateStats(); updateTabCounts(); renderAll(); }
    });
    showToast('Connected to Firebase');
    document.getElementById('setupBanner').innerHTML = '';
  } catch(err) {
    console.error(err);
    setSyncState('error','Connection failed — check settings');
    showToast('Error: ' + err.message);
  }
}

async function persist() {
  if (!db) return;
  writing = true;
  setSyncState('syncing','Saving…');
  try {
    await setDoc(doc(db, ...DOC_PATH), { trips });
    const t = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setSyncState('connected','Connected · saved at ' + t);
  } catch(e) {
    setSyncState('error','Save failed');
    showToast('Save failed: ' + e.message);
  } finally { writing = false; }
}

function setSyncState(cls, label) {
  document.getElementById('syncDot').className = 'sync-dot' + (cls ? ' ' + cls : '');
  document.getElementById('syncLabel').textContent = label;
}

// ── Helpers ──
function parseDateStr(s) {
  if (!s) return null;
  const mo = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const m = s.match(/^([A-Za-z]+)\s+(\d+)/);
  return m ? new Date(2026, mo[m[1]], +m[2]) : null;
}
function isPast(t) { const d = parseDateStr(t.date); return d && d < TODAY; }
function progressFor(ti) {
  const t = trips[ti];
  const done = t.items.filter(it => it.status==='Booked'||it.status==='Confirmed').length;
  return [done, t.items.length];
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Stats ──
function updateStats() {
  let total=0, done=0, pend=0;
  trips.forEach(t => t.items.forEach(it => { total++; (it.status==='Booked'||it.status==='Confirmed')?done++:pend++; }));
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Trips</div><div class="stat-value">${trips.length}</div></div>
    <div class="stat"><div class="stat-label">Requirements</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">Completed</div><div class="stat-value green">${done}</div></div>
    <div class="stat"><div class="stat-label">Still needed</div><div class="stat-value amber">${pend}</div></div>`;
}

// ── Render ──
function tripHTML(ti) {
  const trip = trips[ti], past = isPast(trip), open = !!expanded[ti];
  const [done, total] = progressFor(ti);
  const pct = total ? Math.round(done/total*100) : 0;
  const color = MONTH_COLORS[trip.month % MONTH_COLORS.length];
  let h = `<div class="trip-card${past?' past-trip':''}" id="tc-${ti}">
    <div class="trip-header" onclick="handleHeaderClick(event,${ti})">
      <div class="month-dot" style="background:${color}"></div>
      <div class="trip-meta">
        <div class="trip-name-row"><span class="trip-name">${esc(trip.name)}</span>${past?'<span class="past-badge">past</span>':''}</div>
        <div class="trip-date-label">${esc(trip.date)}</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="pf-${ti}" style="width:${pct}%;background:${color}"></div></div>
        <span class="progress-text" id="pt-${ti}">${done}/${total}</span>
      </div>
      <button class="btn btn-sm" onclick="openEdit(event,${ti})">Edit</button>
      <span class="chevron" style="${open?'transform:rotate(180deg)':''}">&#9660;</span>
    </div>`;
  if (open) {
    h += `<div class="trip-items"><div class="col-header"><span class="col-label">Requirement</span><span class="col-label">Status</span><span class="col-label">Details</span></div>`;
    trip.items.forEach((item,ii) => {
      h += `<div class="item-row">
        <div><div class="item-name">${esc(item.name)}</div>${item.date?`<div class="item-date-lbl">${esc(item.date)}</div>`:''}</div>
        <select class="status-select" onchange="onStatusChange(${ti},${ii},this.value)">
          ${STATUSES.map(s=>`<option value="${s}"${s===item.status?' selected':''}>${s}</option>`).join('')}
        </select>
        <div class="item-details-lbl">${esc(item.details)||'—'}</div>
      </div>`;
    });
    h += '</div>';
  }
  return h + '</div>';
}

function filteredIndices() {
  return trips.map((_,i) => i).filter(i => {
    const past = isPast(trips[i]);
    if (activeTab === 'upcoming') return !past;
    if (activeTab === 'past') return past;
    return true;
  });
}

function updateTabCounts() {
  const upcoming = trips.filter(t => !isPast(t)).length;
  const past = trips.filter(t => isPast(t)).length;
  document.getElementById('cnt-upcoming').textContent = upcoming;
  document.getElementById('cnt-all').textContent = trips.length;
  document.getElementById('cnt-past').textContent = past;
}

function setTab(tab) {
  activeTab = tab;
  ['upcoming','all','past'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === tab);
  });
  expanded = {};
  renderAll();
}

function renderAll() {
  const indices = filteredIndices();
  if (indices.length === 0) {
    const msgs = { upcoming: 'No upcoming trips', all: 'No trips yet', past: 'No past trips' };
    document.getElementById('tripList').innerHTML = `<div class="empty-state"><div style="font-size:32px;margin-bottom:12px;opacity:0.35">&#9992;</div>${msgs[activeTab]}</div>`;
    return;
  }
  document.getElementById('tripList').innerHTML = indices.map(i => tripHTML(i)).join('');
  updateTabCounts();
}

function handleHeaderClick(e,ti) {
  if (e.target.closest('.btn')) return;
  expanded[ti] = !expanded[ti];
  const el = document.getElementById('tc-'+ti);
  if (el) el.outerHTML = tripHTML(ti);
}

function onStatusChange(ti,ii,val) {
  trips[ti].items[ii].status = val;
  updateStats();
  const fill = document.getElementById('pf-'+ti), txt = document.getElementById('pt-'+ti);
  if (fill) { const [d,t] = progressFor(ti); fill.style.width=(t?Math.round(d/t*100):0)+'%'; if(txt) txt.textContent=d+'/'+t; }
  persist();
  showToast('Saved');
}

// ── Trip modal ──
function openEdit(e,ti) {
  e.stopPropagation();
  editingIdx = ti;
  editDraft = JSON.parse(JSON.stringify(trips[ti]));
  document.getElementById('tripModalTitle').textContent = 'Edit trip';
  document.getElementById('delTripBtn').style.display = '';
  renderTripBody();
  document.getElementById('tripModal').classList.add('open');
}

function openAddTrip() {
  editingIdx = null;
  editDraft = {name:'',date:'',month:0,items:[]};
  document.getElementById('tripModalTitle').textContent = 'Add trip';
  document.getElementById('delTripBtn').style.display = 'none';
  renderTripBody();
  document.getElementById('tripModal').classList.add('open');
}

function renderTripBody() {
  const trip = editDraft;
  const monthOpts = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
    .map((m,i)=>`<option value="${i}"${i===trip.month?' selected':''}>${m}</option>`).join('');
  const rows = trip.items.map((it,ii)=>`<tr>
    <td><input class="table-input" value="${esc(it.name)}" oninput="editDraft.items[${ii}].name=this.value"></td>
    <td><input class="table-input" value="${esc(it.date||'')}" oninput="editDraft.items[${ii}].date=this.value" style="max-width:88px"></td>
    <td><select class="table-select" onchange="editDraft.items[${ii}].status=this.value">${STATUSES.map(s=>`<option value="${s}"${s===it.status?' selected':''}>${s}</option>`).join('')}</select></td>
    <td><input class="table-input" value="${esc(it.details||'')}" oninput="editDraft.items[${ii}].details=this.value"></td>
    <td><button class="del-btn" onclick="removeItem(${ii})">&#215;</button></td>
  </tr>`).join('');

  document.getElementById('tripModalBody').innerHTML = `
    <p class="section-label">Trip details</p>
    <div class="trip-fields-grid">
      <div class="field-group"><label class="field-label">Name</label><input class="field-input" value="${esc(trip.name)}" oninput="editDraft.name=this.value" placeholder="e.g. Austin Trip"></div>
      <div class="field-group"><label class="field-label">Date label</label><input class="field-input" value="${esc(trip.date)}" oninput="editDraft.date=this.value" placeholder="e.g. Jun 15"></div>
    </div>
    <div class="field-group"><label class="field-label">Month (for color)</label>
      <select class="field-input" onchange="editDraft.month=parseInt(this.value)" style="max-width:160px">${monthOpts}</select>
    </div>
    <p class="section-label">Requirements</p>
    <div style="overflow-x:auto">
      <table class="items-table">
        <thead><tr><th>Requirement</th><th>Date</th><th>Status</th><th>Details</th><th style="width:32px"></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <button class="add-row-btn" onclick="addItem()">+ Add requirement</button>`;
}

function addItem() { editDraft.items.push({name:'',date:'',status:'Not Booked',details:''}); renderTripBody(); }
function removeItem(ii) { editDraft.items.splice(ii,1); renderTripBody(); }

async function saveTrip() {
  if (!editDraft.name.trim()) { showToast('Please enter a trip name'); return; }
  if (editingIdx===null) trips.push(JSON.parse(JSON.stringify(editDraft)));
  else trips[editingIdx] = JSON.parse(JSON.stringify(editDraft));
  closeModal('tripModal');
  updateStats(); updateTabCounts(); renderAll();
  await persist();
  showToast(editingIdx===null ? 'Trip added' : 'Trip updated');
}

async function deleteTrip() {
  if (!confirm(`Delete "${trips[editingIdx].name}"?`)) return;
  trips.splice(editingIdx,1);
  closeModal('tripModal');
  updateStats(); updateTabCounts(); renderAll();
  await persist();
  showToast('Trip deleted');
}

// ── Settings modal ──
function openSettings() {
  const cfg = getCfg() || {};
  document.getElementById('settingsBody').innerHTML = `
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;line-height:1.6;">
      Find your config in <strong>Firebase Console → Project Settings → Your apps → SDK setup and configuration</strong>. Paste the values below.
    </p>
    ${['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'].map(k=>`
    <div class="field-group">
      <label class="field-label">${k}</label>
      <input class="field-input" id="cfg-${k}" value="${esc(cfg[k]||'')}" placeholder="${k}">
    </div>`).join('')}`;
  document.getElementById('settingsModal').classList.add('open');
}

async function saveSettings() {
  const keys = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];
  const cfg = Object.fromEntries(keys.map(k => [k, document.getElementById('cfg-'+k).value.trim()]));
  if (!cfg.apiKey || !cfg.projectId) { showToast('API Key and Project ID required'); return; }
  setCfg(cfg);
  closeModal('settingsModal');
  await connect(cfg);
}

// ── Utilities ──
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function handleBackdropClick(e,id) { if (e.target===document.getElementById(id)) closeModal(id); }

function exportCSV() {
  let csv = 'Trip,Date,Requirement,Req Date,Status,Details\n';
  trips.forEach(t => t.items.forEach(it => {
    csv += `"${t.name}","${t.date}","${it.name}","${it.date||''}","${it.status}","${it.details||''}"\n`;
  }));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = '2026_travel.csv';
  a.click();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid = setTimeout(()=>t.classList.remove('show'),2200);
}

// expose to inline handlers
Object.assign(window, { handleHeaderClick, onStatusChange, openEdit, openAddTrip,
  addItem, removeItem, saveTrip, deleteTrip, openSettings, saveSettings,
  closeModal, handleBackdropClick, expandAll, collapseAll, exportCSV, setTab });

function expandAll() { filteredIndices().forEach(i=>expanded[i]=true); renderAll(); }
function collapseAll() { expanded={}; renderAll(); }

// ── Swipe gesture support ──
(function() {
  let startX = 0, startY = 0, startTime = 0;
  const TABS = ['upcoming', 'all', 'past'];

  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startTime = Date.now();
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const dt = Date.now() - startTime;
    // Must be fast enough, horizontal enough, and long enough
    if (dt > 400) return;
    if (Math.abs(dx) < 50) return;
    if (Math.abs(dy) > Math.abs(dx) * 0.8) return;
    const cur = TABS.indexOf(activeTab);
    if (dx < 0 && cur < TABS.length - 1) {
      setTab(TABS[cur + 1]);
      const hint = document.getElementById('swipeHint');
      if (hint) hint.style.display = 'none';
    }
    if (dx > 0 && cur > 0) {
      setTab(TABS[cur - 1]);
      const hint = document.getElementById('swipeHint');
      if (hint) hint.style.display = 'none';
    }
  }, { passive: true });
})();

updateStats(); updateTabCounts(); renderAll();
